function fmtEur(n, decimals){
  const d = decimals === undefined ? 0 : decimals;
  return n.toLocaleString('de-DE', { minimumFractionDigits:d, maximumFractionDigits:d }) + ' €';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function cartCount(){ return S.cart.reduce((a,it)=>a+it.qty,0); }
function cartTotal(){ return S.cart.reduce((a,it)=>a+it.qty*prod(it.id).price,0); }

function calcVals(){
  const CP = prod(S.calcProduct);
  const yieldKwh = Math.round(CP.kwp * SPEC_YIELD[S.region]);
  const savings = yieldKwh * S.strompreis / 100;
  const amortYears = CP.price / savings;
  return { CP, yieldKwh, savings, amortYears };
}

function addQty(id, n){
  const cart = S.cart.slice();
  const idx = cart.findIndex(it => it.id === id);
  if (idx >= 0) cart[idx] = Object.assign({}, cart[idx], { qty: cart[idx].qty + n });
  else cart.push({ id:id, qty:n });

  showToast(n === 1 ? 'Zum Warenkorb hinzugefügt' : n + '× zum Warenkorb hinzugefügt');
}
function changeQty(id, delta){
  let cart = S.cart.map(it => it.id === id ? Object.assign({}, it, { qty: it.qty + delta }) : it);

  setCart(cart); render();
}

let _mapContainer = null, _map = null, _markers = {}, _pendingFocus = null;
function getMapContainer(){
  if (!_mapContainer){
    _mapContainer = document.createElement('div');
    _mapContainer.style.cssText = 'height:540px;border-radius:22px;overflow:hidden;background:#e8e8ed;';

}
function initMapIfNeeded(){
  if (_map) { if (_pendingFocus){ const id=_pendingFocus; _pendingFocus=null; showDealer(id); } _map.resize(); return; }
  if (!window.maplibregl){ setTimeout(initMapIfNeeded, 150); return; }
  _map = new window.maplibregl.Map({
    container: _mapContainer,
    style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center: [9.2, 49.7], zoom: 5.4, attributionControl: { compact:true }
  });
  _map.addControl(new window.maplibregl.NavigationControl({ showCompass:false }), 'bottom-right');
  _markers = {};
  DEALERS.forEach(d => {
    const popup = new window.maplibregl.Popup({ offset:22, closeButton:false }).setHTML(
      '<div style="font-family:Montserrat,sans-serif;font-size:13px;line-height:1.6"><b style="font-size:14px">'+d.name+'</b><br>'+d.strasse+'<br>'+d.ort+'</div>'
    );
    const m = new window.maplibregl.Marker({ color:'#111113' }).setLngLat([d.lng, d.lat]).setPopup(popup).addTo(_map);
    _markers[d.id] = m;
  });
  _map.on('load', ()=>{ if (_pendingFocus){ const id=_pendingFocus; _pendingFocus=null; showDealer(id); } });
}
function showDealer(id){
  const d = DEALERS.find(x => x.id === id);
  if (_map && d){
    _map.flyTo({ center:[d.lng, d.lat], zoom:12.5, duration:1400 });
    Object.keys(_markers).forEach(k => {
      const pop = _markers[k].getPopup();
      if (k === id){ if (pop && !pop.isOpen()) _markers[k].togglePopup(); }
      else { if (pop && pop.isOpen()) _markers[k].togglePopup(); }
    });
  } else { _pendingFocus = id; }
}
function haversine(a, b){
  const R=6371, rad=Math.PI/180;
  const dLat=(b[0]-a[0])*rad, dLng=(b[1]-a[1])*rad;
  const s=Math.sin(dLat/2)**2 + Math.cos(a[0]*rad)*Math.cos(b[0]*rad)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function doSearch(){
  const q = (S.searchQuery || '').trim().toLowerCase();
  if (!q){ S.searchInfo = null; S.distances = null; render(); return; }
  let coords = null;
  if (CITIES[q]) coords = CITIES[q];
  else { const digits = q.replace(/[^0-9]/g,''); if (digits.length >= 1 && PLZ_ZONES[digits[0]]) coords = PLZ_ZONES[digits[0]]; }
  if (!coords){ S.searchInfo = 'Ort nicht gefunden – bitte Stadt oder Postleitzahl eingeben.'; S.distances = null; render(); return; }
  const distances = {}; let nearest = null;
  DEALERS.forEach(d => { const km = Math.round(haversine(coords, [d.lat, d.lng])); distances[d.id] = km; if (!nearest || km < distances[nearest]) nearest = d.id; });
  const nd = DEALERS.find(d => d.id === nearest);
  S.searchInfo = 'Nächster Händler: ' + nd.name + ' (ca. ' + distances[nearest] + ' km entfernt)';
  S.distances = distances;
  render();
  showDealer(nearest);
}

function calcNote(CP){ return 'Berechnung auf Basis des ' + CP.name + ' mit ' + CP.wp + ' Wp-Solarmodul, optimal geneigt um 25°. Richtwerte bei vollständiger Eigennutzung des erzeugten Stroms.'; }
function calcProductsHtml(){
  return PRODUCTS.map(p => {
    const active = S.calcProduct === p.id;
    const style = 'flex: 1; cursor: pointer; text-align: center; padding: 13px 8px; border-radius: 14px; transition: all .15s; border: 1.5px solid ' + (active?'#111113':'#d2d2d7') + '; background: ' + (active?'#111113':'#ffffff') + '; color: ' + (active?'#ffffff':'#1d1d1f') + ';';
    const subStyle = 'font-size: 12px; margin-top: 2px; color: ' + (active?'rgba(255,255,255,0.7)':'#86868b') + ';';
    return `<a data-action="calc-select" data-arg="${p.id}" style="${style}"><div style="font-weight: 700; font-size: 15px;">${p.shortLabel}</div><div style="${subStyle}">${p.wp} Wp</div></a>`;
  }).join('');
}
function updateCalcDom(){
  const v = calcVals();
  const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  set('calc-strom', S.strompreis);
  set('calc-ersparnis', fmtEur(v.savings));
  set('calc-ertrag', v.yieldKwh.toLocaleString('de-DE') + ' kWh');
  set('calc-amort', v.amortYears.toLocaleString('de-DE',{maximumFractionDigits:1}) + ' Jahre');
  set('calc-ersparnis25', fmtEur(v.savings*25));
  set('calc-note', calcNote(v.CP));
  const cp = document.getElementById('calc-products'); if (cp) cp.innerHTML = calcProductsHtml();
}

  } else if (S.checkoutStep === 2){

    inner = `<div style="background: #ffffff; border-radius: 22px; padding: 40px;">
      <h2 style="margin: 0 0 24px; font-size: 21px; font-weight: 700;">Zahlungsart</h2>
      <div style="display: flex; flex-direction: column; gap: 12px;">

    </div>`;
  } else {
    const f = S.fields;
    const lines = S.cart.map(it => { const p = prod(it.id); return `<div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f2; font-size: 14.5px;"><span style="font-weight: 600;">${it.qty} × ${p.fullName}</span><span style="font-weight: 700;">${fmtEur(it.qty*p.price)}</span></div>`; }).join('');

/* ---------- Render ---------- */
function pageContent(){
  switch (S.page){
    case 'home': return pageHome();
    case 'mehr': return pageMehr();
    case 'about': return pageAbout();
    case 'blog': return pageBlog();
    case 'faq': return pageFaq();
    case 'haendler': return pageHaendler();
    case 'shop': return pageShop();
    case 'produkt': return pageProdukt();
    case 'warenkorb': return pageCart();
    case 'checkout': return pageCheckout();
    case 'business': return pageBusiness();
    default: return pageHome();
  }
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = header() + '<main style="flex: 1;">' + pageContent() + '</main>' + toastEl() + footer();
  if (S.page === 'haendler'){
    const slot = document.getElementById('map-slot');
    if (slot){ slot.appendChild(getMapContainer()); initMapIfNeeded(); }
  }
}

/* ---------- Events ---------- */
document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const action = t.getAttribute('data-action');
  const arg = t.getAttribute('data-arg');
  // Aktionen, die nicht navigieren (kein preventDefault nötig für a ohne href)
  switch (action){
    case 'home': go('home'); break;
    case 'shop': go('shop'); break;
    case 'cart': go('warenkorb'); break;
    case 'checkout': S.checkoutStep = 1; S.ordered = false; go('checkout'); break;
    case 'haendler': go('haendler'); break;
    case 'business': go('business'); break;
    case 'about': go('about'); break;
    case 'mehr': go('mehr'); break;
    case 'faq': go('faq'); break;
    case 'blog': S.blogPost = null; go('blog'); break;
    case 'blog-open': S.blogPost = arg; go('blog'); break;
    case 'blog-list': S.blogPost = null; render(); break;
    case 'rechner': {
      const scroll = () => { const el = document.getElementById('rechner'); if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 70, behavior:'smooth' }); };
      if (S.page !== 'home'){ go('home'); setTimeout(scroll, 120); } else scroll();
      break;
    }
    case 'produkt-one-plus': S.selectedProduct = 'one-plus'; go('produkt'); break;
    case 'produkt-open': S.selectedProduct = arg; go('produkt'); break;
    case 'add-one-plus': addQty('one-plus', 1); break;
    case 'add': addQty(arg, 1); break;
    case 'calc-select': S.calcProduct = arg; updateCalcDom(); break;
    case 'qty-inc': S.qty = Math.min(9, S.qty + 1); render(); break;
    case 'qty-dec': S.qty = Math.max(1, S.qty - 1); render(); break;
    case 'add-qty': { const id = prod(S.selectedProduct).id; addQty(id, S.qty); S.qty = 1; break; }
    case 'cart-inc': changeQty(arg, 1); break;
    case 'cart-dec': changeQty(arg, -1); break;
    case 'cart-remove': { const it = S.cart.find(x => x.id === arg); if (it) changeQty(arg, -it.qty); break; }
    case 'faq-toggle': S.openFaq = (S.openFaq === arg ? null : arg); render(); break;
    case 'dealer-show': showDealer(arg); break;
    case 'search-submit': doSearch(); break;
    case 'to-step1': S.checkoutStep = 1; render(); break;
    case 'to-step2': {
      const f = S.fields;
      const missing = !f.vorname || !f.nachname || !f.email || !f.strasse || !f.plz || !f.ort;
      if (missing){ S.formError = 'Bitte fülle alle Pflichtfelder aus.'; render(); break; }
      S.checkoutStep = 2; window.scrollTo({ top:0 }); render(); break;
    }
    case 'to-step3': S.checkoutStep = 3; window.scrollTo({ top:0 }); render(); break;
    case 'place-order': {
      const num = 'SU-2026-' + Math.floor(1000 + Math.random() * 9000);
      S.ordered = true; S.orderNumber = num; setCart([]); window.scrollTo({ top:0 }); render(); break;
    }
  }
});

// Live-Eingaben (kein Re-Render, damit Fokus erhalten bleibt)
document.addEventListener('input', (e) => {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const action = t.getAttribute('data-action');
  if (action === 'calc-strom'){ S.strompreis = parseInt(t.value, 10); updateCalcDom(); }
  else if (action === 'search-input'){ S.searchQuery = t.value; }
  else if (action === 'field'){ S.fields = Object.assign({}, S.fields, { [t.name]: t.value }); }
});
document.addEventListener('change', (e) => {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const action = t.getAttribute('data-action');
  if (action === 'calc-region'){ S.region = t.value; updateCalcDom(); }
  else if (action === 'payment'){ S.payment = t.value; }
});
document.addEventListener('keydown', (e) => {
  const t = e.target.closest('[data-action="search-input"]');
  if (t && e.key === 'Enter') doSearch();
});

render();
</script>
